<!DOCTYPE html>
<html>

<head>
<title>Smart Bus Crowd Prediction</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:500px;
margin:auto;
background:white;
padding:30px;
margin-top:80px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input,select{
padding:10px;
width:80%;
margin:10px;
}

button{
padding:12px 25px;
background:green;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
background:#eeeeee;
padding:20px;
white-space:pre-line;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>OmniFlow System</h2>

<form action="/predict" method="post">

<input type="text" name="bus" placeholder="Enter Bus Number (72)" required>

<br>

<select name="stop" required>

<option value="">Select Your Stop</option>

<option>Thiruverkadu</option>
<option>Nerkundram</option>
<option>Rohini</option>
<option>Chathiram</option>
<option>Koyambedu</option>
<option>Arumbakkam</option>
<option>Vadapalani</option>
<option>Ashok Nagar</option>
<option>Saidapet</option>
<option>Teynampet</option>
<option>T Nagar</option>

</select>

<br>

<button type="submit">Start Detection</button>

</form>

{% if result %}

<div class="result">

<h3>Prediction Result</h3>

<pre>{{ result }}</pre>

</div>

{% endif %}

</div>

</body>

</html>
